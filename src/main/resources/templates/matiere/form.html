<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Matière - Formulaire</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/nav :: navbar}"></div>

    <div class="container" style="max-width: 600px;">
        <h1 th:text="${matiere.id == null ? 'Nouvelle Matière' : 'Modifier la Matière'}">Matière</h1>
        <div class="card">
            <form th:action="@{/matieres/save}" th:object="${matiere}" method="post">
                <input type="hidden" th:field="*{id}" />
                <div class="form-group">
                    <label>Nom de la Matière</label>
                    <input type="text" th:field="*{nom}" placeholder="Ex: Mathématiques" required />
                </div>
                <div style="margin-top: 1rem;">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a th:href="@{/matieres}" class="btn">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
