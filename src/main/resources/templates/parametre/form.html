<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Paramètre - Formulaire</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/nav :: navbar}"></div>

    <div class="container" style="max-width: 600px;">
        <h1 th:text="${parametre.id == null ? 'Nouveau Paramètre' : 'Modifier le Paramètre'}">Paramètre</h1>
        <div class="card">
            <form th:action="@{/parametres/save}" th:object="${parametre}" method="post">
                <input type="hidden" th:field="*{id}" />
                <div class="form-group">
                    <label>Matière</label>
                    <select th:field="*{matiere.id}" required>
                        <option th:each="m : ${matieres}" th:value="${m.id}" th:text="${m.nom}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Différence de Seuil</label>
                    <input type="number" step="0.01" th:field="*{diff}" required />
                </div>
                <div class="form-group">
                    <label>Opérateur</label>
                    <select th:field="*{operateur.id}" required>
                        <option th:each="o : ${operateurs}" th:value="${o.id}" th:text="${o.symbole}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Résolution</label>
                    <select th:field="*{resolution.id}" required>
                        <option th:each="r : ${resolutions}" th:value="${r.id}" th:text="${r.nom}"></option>
                    </select>
                </div>
                <div style="margin-top: 1rem;">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a th:href="@{/parametres}" class="btn">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
